# get.limackcorp.online — dedicated tunnel (no sudo, no touch to the main tunnel).
# nginx serves the repo from disk; cloudflared exposes it.
# Deploy:  docker compose -f deploy/docker-compose.yml up -d --build   (run from repo root)

services:
  web:
    image: nginx:alpine
    container_name: devtools_web
    restart: unless-stopped
    volumes:
      - ../:/srv/repo:ro                                   # the repo itself
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [devtools]

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: devtools_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on: [web]
    networks: [devtools]

networks:
  devtools:
    name: devtools
