server {
    listen 80;
    server_name get.limackcorp.online;

    # serve the repo straight from disk: a `git pull` here updates the live URL.
    root /srv/repo;
    default_type text/plain;
    charset utf-8;

    # never expose .git or other dotfiles
    location ~ /\. { deny all; return 404; }

    # the one-liner: curl get.limackcorp.online | sh  ->  install.sh
    location = / { try_files /install.sh =404; }

    # tool scripts by path (so the hub can use this domain as RAW_BASE too)
    location / { try_files $uri =404; }
}
